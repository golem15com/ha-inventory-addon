# Add this line to your Home Assistant <config>/secrets.yaml
# (do NOT commit the real token). The value must include the "Bearer " prefix
# because rest_command passes it straight through as the Authorization header.
#
# Mint the token at: https://whereiput.it/settings?tab=integrations
#   - name: "Home Assistant"
#   - scope: read   (read-only — voice search never needs write/ai)
# The raw inv_... secret is shown once; copy it here immediately.

whereiput_inventory_token: "Bearer inv_REPLACE_WITH_YOUR_READ_TOKEN"
